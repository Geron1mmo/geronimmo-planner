name: geronimmo_planner
description: "Geronimmo Planner - Beautiful, simple and fast cross-platform planner. Supports tasks, calendar, events, reminders, notes and smart productivity features. Fully multilingual (Ukrainian, Russian, Czech, English). Created by Geronimmo & Oleg."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Local database - reliable cross platform
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path_provider: ^2.1.4
  path: ^1.9.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Calendar UI
  table_calendar: ^3.1.2

  # Utils
  uuid: ^4.4.2
  collection: ^1.18.0

  # UI / UX
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1   # for premium typography if needed, fallback to system

  # Icon / splash generation helpers (dev)
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  test: ^1.25.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/   # for future easy localization or seed

  # Fonts if added later
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: true
    icon_size: 48
  macos:
    generate: false

flutter_native_splash:
  color: "#0F172A"
  color_dark: "#0F172A"
  image: assets/icons/splash_icon.png
  android_12:
    image: assets/icons/splash_icon.png
    color: "#0F172A"
    color_dark: "#0F172A"
  web: false
  ios: true
  android: true
  fullscreen: true
